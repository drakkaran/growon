<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Account — GrowOn</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .dash-wrap { max-width: 820px; margin: 0 auto; padding: 36px 24px 60px; }
    .dash-header { display: flex; align-items: center; gap: 18px; margin-bottom: 32px; }
    .avatar {
      width: 54px; height: 54px;
      background: var(--sage);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: 'DM Serif Display', serif;
      font-size: 20px; color: white; flex-shrink: 0;
    }
    .dash-header h2 { font-size: 22px; margin-bottom: 3px; }
    .dash-header .sub { font-size: 13px; color: var(--muted); }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 28px;
    }
    .stat-card { background: white; border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; }
    .stat-card.highlight { background: var(--sage); border-color: transparent; }
    .stat-card .num { font-family: 'DM Serif Display', serif; font-size: 30px; color: var(--ink); line-height: 1; }
    .stat-card.highlight .num { color: white; }
    .stat-card .lbl { font-size: 12px; color: var(--muted); margin-top: 5px; }
    .stat-card.highlight .lbl { color: rgba(255,255,255,0.7); }

    .section-heading { font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }

    .activity-list { background: white; border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 28px; }
    .activity-item { display: flex; align-items: center; gap: 14px; padding: 14px 18px; border-bottom: 1px solid var(--border); }
    .activity-item:last-child { border-bottom: none; }
    .activity-icon { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
    .activity-icon.contributed { background: var(--sage-light); }
    .activity-icon.claimed     { background: var(--clay-light); }
    .activity-text { flex: 1; min-width: 0; }
    .activity-text p    { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .activity-text span { font-size: 12px; color: var(--muted); }
    .activity-pts       { font-size: 13px; font-weight: 600; flex-shrink: 0; }
    .activity-pts.plus  { color: var(--sage); }
    .activity-pts.minus { color: var(--clay); }

    .wishlist-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 28px; }
    .wishlist-tag { background: var(--sage-light); color: var(--sage); padding: 6px 14px; border-radius: 999px; font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 6px; }
    .wishlist-remove { cursor: pointer; opacity: 0.6; font-size: 16px; }
    .wishlist-remove:hover { opacity: 1; }
    .add-wishlist-btn { background: transparent; border: 1.5px dashed var(--sage-mid); color: var(--sage); padding: 6px 14px; border-radius: 999px; font-size: 13px; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: background 0.15s; }
    .add-wishlist-btn:hover { background: var(--sage-light); }

    .empty-activity { text-align: center; padding: 40px; color: var(--muted); font-size: 14px; }

    .hidden { display: none; }
  </style>
  <!-- Supabase must load before any app scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

<nav>
  <a class="logo" href="index.html">Grow<span>On</span></a>
  <div class="nav-links">
    <a class="nav-btn ghost" href="browse.html">Browse</a>
    <a class="nav-btn ghost" href="contribute.html">Contribute</a>
    <a class="nav-btn active hidden" id="nav-account" href="dashboard.html">My Account</a>
    <a class="nav-btn ghost hidden" id="nav-signout" href="#">Sign out</a>
    <a class="nav-btn primary" id="nav-signin" href="login.html">Join Free</a>
  </div>
</nav>

<div class="dash-wrap">
  <!-- Header -->
  <div class="dash-header">
    <div class="avatar" id="dash-avatar">?</div>
    <div>
      <h2 id="dash-name">Loading…</h2>
      <div class="sub" id="dash-sub"></div>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-grid">
    <div class="stat-card highlight"><div class="num" id="stat-balance">—</div><div class="lbl">Points balance</div></div>
    <div class="stat-card"><div class="num" id="stat-contributed">—</div><div class="lbl">Items contributed</div></div>
    <div class="stat-card"><div class="num" id="stat-claimed">—</div><div class="lbl">Items claimed</div></div>
    <div class="stat-card"><div class="num" id="stat-ratio">—</div><div class="lbl">Give/claim ratio</div></div>
  </div>

  <!-- Activity -->
  <div class="section-heading">Recent activity</div>
  <div class="activity-list" id="activity-list">
    <div class="empty-activity">Loading activity…</div>
  </div>

  <!-- Wishlist -->
  <div class="section-heading">Wishlisted sizes</div>
  <div class="wishlist-row" id="wishlist-row">
    <button class="add-wishlist-btn" onclick="promptWishlist()">+ Add size</button>
  </div>

  <a class="btn btn-sage btn-full btn-lg" href="contribute.html">Contribute more items →</a>
</div>

<!-- Add wishlist modal -->
<div class="modal-overlay" id="wishlist-modal">
  <div class="modal">
    <h3 style="margin-bottom:6px">Add to wishlist</h3>
    <p style="color:var(--muted);font-size:14px;margin-bottom:18px">We'll notify you when matching items become available.</p>
    <div class="form-row" style="margin-bottom:14px">
      <div class="form-group">
        <label>Gender</label>
        <select class="form-input" id="wl-gender">
          <option>Girls</option>
          <option>Boys</option>
          <option>Unisex</option>
        </select>
      </div>
      <div class="form-group">
        <label>Size group</label>
        <select class="form-input" id="wl-size">
          <option value="newborn">000–00 Newborn</option>
          <option value="0-1">0–1 (3–12 months)</option>
          <option value="2-3">2–3 (1–3 years)</option>
          <option value="4-5">4–5 (4–5 years)</option>
          <option value="6-8">6–8 (5–8 years)</option>
          <option value="10-14">10–14 (9–14 years)</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Category (optional)</label>
      <select class="form-input" id="wl-cat">
        <option value="">Any category</option>
        <option>Tops</option><option>Bottoms</option><option>Outerwear</option>
        <option>Swimwear</option><option>Footwear</option><option>School uniform</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal('wishlist-modal')">Cancel</button>
      <button class="modal-confirm" onclick="saveWishlist()">Save</button>
    </div>
  </div>
</div>

<script src="js/supabase-client.js" defer></script>
<script src="js/ui.js" defer></script>

<script src="js/page-dashboard.js" defer></script>
</body>
</html>
